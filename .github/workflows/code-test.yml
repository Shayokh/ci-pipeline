name: Python Code Tests

on:
  push:
    branches:
      - feature/python-code
  pull_request:
    branches:
      - feature/python-code

permissions:
  contents: read

jobs:
  test-python:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install Dependencies
        run: |
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest

      - name: Ensure Tests Directory Exists
        run: |
          mkdir -p tests
          touch tests/__init__.py

      - name: Check for Existing Tests
        run: |
          echo "Checking for test files..."
          ls -la tests/

      - name: Run Tests
        run: |
          pytest tests/ --maxfail=5 --disable-warnings || echo "No tests found or tests failed."
